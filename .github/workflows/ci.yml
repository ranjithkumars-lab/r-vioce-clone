name: Voice Studio CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install Linting Tools
        run: |
          pip install flake8 black
      - name: Python Formatting Check
        run: black --check backend/
      - name: Python Linting
        run: flake8 backend/

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend Linting
        run: |
          cd frontend
          npm ci
          npm run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install mypy
        run: pip install mypy
      - name: Python Type Check
        run: mypy backend/

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: TypeScript Type Check
        run: |
          cd frontend
          npm ci
          npx tsc --noEmit

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [lint-and-format, type-check]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Run Pytest
        run: |
          cd backend
          pytest -v

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [lint-and-format, type-check]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Run Vitest
        run: |
          cd frontend
          npm ci
          npm run test -- --run

  security-scan:
    name: Security Scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Bandit Scan (Python)
        run: |
          pip install bandit
          bandit -r backend/ -ll -ii
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: npm audit (Node)
        run: |
          cd frontend
          npm audit --audit-level=high

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, security-scan]
    steps:
      - uses: actions/checkout@v4
      - name: Build API Image
        run: docker build -t voicestudio-api:test -f backend/Dockerfile backend/
      - name: Build Worker Image
        run: docker build -t voicestudio-worker:test -f backend/Dockerfile.worker backend/
      - name: Build Frontend Image
        run: docker build -t voicestudio-frontend:test -f frontend/Dockerfile frontend/
