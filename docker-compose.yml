version: "2.3"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: voicestudio-api:latest
    ports:
      - "18000:8000"
    environment:
      APP_ENV: ${APP_ENV:-production}
      API_V1_STR: /api/v1
      LOG_LEVEL: info
      STORAGE_DIR: /app/storage
      DB_URL: sqlite:////app/storage/voice_studio.db
      QUEUE_BACKEND: ${QUEUE_BACKEND:-sqlite}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - /raid/docker-project:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    image: voicestudio-worker:latest
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      APP_ENV: ${APP_ENV:-production}
      API_V1_STR: /api/v1
      LOG_LEVEL: info
      STORAGE_DIR: /app/storage
      DB_URL: sqlite:////app/storage/voice_studio.db
      QUEUE_BACKEND: ${QUEUE_BACKEND:-sqlite}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - /raid/docker-project:/app/storage
    depends_on:
      - api

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: voicestudio-frontend:latest
    ports:
      - "18080:80"
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "19090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "13000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin_secure}
    depends_on:
      - prometheus

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data

volumes:
  prometheus-data:
  grafana-data:
  redis-data:
